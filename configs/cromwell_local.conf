# ─────────────────────────────────────────────────────────────────────────────
# cromwell_local.conf
# Cromwell configuration for local execution (development/testing)
# ─────────────────────────────────────────────────────────────────────────────

include required(classpath("application"))

system {
  abort-jobs-on-terminate = true
  graceful-server-shutdown = true
}

call-caching {
  enabled = true
  invalidate-bad-cache-results = true
}

backend {
  default = "Local"

  providers {
    Local {
      actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"

      config {
        # Run tasks using Docker
        run-in-background = true

        runtime-attributes = """
          String? docker
          Int cpu = 4
          Int memory_gb = 8
        """

        submit-docker = """
          docker run \
            --rm \
            -v ${cwd}:${docker_cwd} \
            -w ${docker_cwd} \
            --cpus ${cpu} \
            --memory ${memory_gb}g \
            ${docker} ${job_shell} ${script}
        """

        filesystems {
          local {
            localization: ["hard-link", "soft-link", "copy"]
          }
        }
      }
    }
  }
}

database {
  profile = "slick.jdbc.HsqldbProfile$"
  db {
    driver   = "org.hsqldb.jdbcDriver"
    url      = "jdbc:hsqldb:mem:${uniqueSchema};shutdown=false;hsqldb.tx=mvcc"
    connectionTimeout = 3000
  }
}
