# ─────────────────────────────────────────────────────────────────────────────
# cromwell_aws.conf
# Cromwell configuration for AWS HealthOmics / AWS Batch
# ─────────────────────────────────────────────────────────────────────────────

include required(classpath("application"))

system {
  abort-jobs-on-terminate = true
  graceful-server-shutdown = true
  max-concurrent-workflows = 10
}

call-caching {
  enabled = true
  invalidate-bad-cache-results = true
}

backend {
  default = "AWSBATCH"

  providers {
    AWSBATCH {
      actor-factory = "cromwell.backend.impl.aws.AwsBatchBackendLifecycleActorFactory"

      config {
        # Replace with your AWS region and S3 bucket
        region = "us-east-1"
        root   = "s3://YOUR-BUCKET/cromwell-executions"

        auth = [
          {
            name = "default"
            scheme = "default"
          }
        ]

        runtime-attributes = """
          Int    cpu         = 4
          Int    memory_gb   = 16
          Int    disks       = 100
          String docker
          String queue_arn   = "arn:aws:batch:us-east-1:YOUR-ACCOUNT:job-queue/sv-pipeline-queue"
        """

        submit = """
          aws batch submit-job \
            --job-name cromwell-${job_name} \
            --job-queue ${queue_arn} \
            --job-definition cromwell-job-definition \
            --container-overrides \
              '{"command": ["${script}"],
                "environment": [{"name": "BATCH_FILE_TYPE", "value": "script"}],
                "resourceRequirements": [
                  {"type": "VCPU",   "value": "${cpu}"},
                  {"type": "MEMORY", "value": "${memory_gb * 1024}"}
                ]}'
        """

        filesystems {
          s3 {
            auth = "default"
            # Enable requester-pays for public datasets (e.g. 1000G)
            requester-pays = false
          }
        }
      }
    }
  }
}

# AWS HealthOmics note:
# For AWS HealthOmics workflows, export this WDL directly via:
#   aws omics create-workflow --definition-zip <zipped wdl dir>
# See docs/architecture.md for full HealthOmics setup guide
